server:
  port: 8076
  servlet:
    context-path: /

spring:
  application:
    name: smart-retry-web
  
  # Jackson时间序列化配置
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  # 数据源配置（默认MySQL，可根据需要切换）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/retry_task?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456789
    
    # PostgreSQL配置示例
    # driver-class-name: org.postgresql.Driver
    # url: jdbc:postgresql://localhost:5432/smart_retry
    # username: postgres
    # password: postgres
    
    # Oracle配置示例
    # driver-class-name: oracle.jdbc.OracleDriver
    # url: jdbc:oracle:thin:@localhost:1521:orcl
    # username: smart_retry
    # password: smart_retry

# MyBatis配置
mybatis:
  mapper-locations: classpath*:mapper/mysql/*.xml
  type-aliases-package: com.smart.retry.web.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  config: classpath:logback-spring.xml
  file: smart-retry